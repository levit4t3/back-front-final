<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitaciones - Hotel Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .badge-DISPONIBLE { background-color: #198754; }
        .badge-OCUPADA { background-color: #dc3545; }
        .badge-MANTENIMIENTO { background-color: #ffc107; color: #000 !important; }
        .badge-SIMPLE { background-color: #0d6efd; }
        .badge-DOBLE { background-color: #6610f2; }
        .badge-SUITE { background-color: #fd7e14; }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid py-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="fas fa-bed text-primary me-2"></i>Habitaciones
        </h4>
        <a th:if="${isAdmin}" th:href="@{/rooms/new}" class="btn btn-primary">
            <i class="fas fa-plus me-2"></i>Nueva Habitación
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">N°</th>
                            <th>Tipo</th>
                            <th>Capacidad</th>
                            <th>Precio/Noche</th>
                            <th>Estado</th>
                            <th>Descripción</th>
                            <th th:if="${isAdmin}" class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(rooms)}">
                            <td colspan="7" class="text-center py-5 text-muted">
                                <i class="fas fa-inbox fa-3x mb-2 d-block opacity-25"></i>
                                No hay habitaciones registradas
                            </td>
                        </tr>
                        <tr th:each="room : ${rooms}">
                            <td class="ps-4 fw-semibold" th:text="${room.roomNumber}"></td>
                            <td>
                                <span class="badge text-white"
                                      th:classappend="'badge-' + ${room.type}"
                                      th:text="${room.type}"></span>
                            </td>
                            <td>
                                <i class="fas fa-user text-muted me-1"></i>
                                <span th:text="${room.capacity}"></span>
                            </td>
                            <td class="fw-semibold text-success">
                                $<span th:text="${#numbers.formatDecimal(room.pricePerNight, 1, 2)}"></span>
                            </td>
                            <td>
                                <span class="badge text-white"
                                      th:classappend="'badge-' + ${room.status}"
                                      th:text="${room.status}"></span>
                            </td>
                            <td class="text-muted small" th:text="${room.description}"></td>
                            <td th:if="${isAdmin}" class="text-center">
                                <a th:href="@{/rooms/{id}/edit(id=${room.id})}" class="btn btn-sm btn-outline-primary me-1">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <button type="button" class="btn btn-sm btn-outline-danger"
                                        data-bs-toggle="modal"
                                        th:data-bs-target="'#deleteModal' + ${room.id}">
                                    <i class="fas fa-trash"></i>
                                </button>

                                <!-- Modal de confirmación de eliminación -->
                                <div class="modal fade" th:id="'deleteModal' + ${room.id}" tabindex="-1">
                                    <div class="modal-dialog modal-sm">
                                        <div class="modal-content">
                                            <div class="modal-header">
                                                <h6 class="modal-title">Confirmar eliminación</h6>
                                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                            </div>
                                            <div class="modal-body text-center">
                                                <i class="fas fa-exclamation-triangle fa-2x text-warning mb-2"></i>
                                                <p class="mb-0">¿Eliminar habitación <strong th:text="${room.roomNumber}"></strong>?</p>
                                            </div>
                                            <div class="modal-footer justify-content-center">
                                                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                                                <form th:action="@{/rooms/{id}/delete(id=${room.id})}" method="post" class="d-inline">
                                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                                    <button type="submit" class="btn btn-danger btn-sm">Eliminar</button>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
