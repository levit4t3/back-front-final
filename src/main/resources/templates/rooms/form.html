<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${editing} ? 'Editar Habitación' : 'Nueva Habitación'">Habitación - Hotel Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style> body { background-color: #f8f9fa; } </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4" style="max-width: 640px;">
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/rooms}" class="btn btn-outline-secondary btn-sm me-3">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h4 class="fw-bold mb-0">
            <i class="fas fa-bed text-primary me-2"></i>
            <span th:text="${editing} ? 'Editar Habitación' : 'Nueva Habitación'"></span>
        </h4>
    </div>

    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-body p-4">
            <form th:action="${editing} ? @{/rooms/{id}/edit(id=${room.id})} : @{/rooms/new}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Número de Habitación <span class="text-danger">*</span></label>
                        <input type="text" name="roomNumber" class="form-control"
                               th:value="${room.roomNumber}" placeholder="Ej: 101" required maxlength="20">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Tipo <span class="text-danger">*</span></label>
                        <select name="type" class="form-select" required>
                            <option value="">-- Seleccionar --</option>
                            <option value="SIMPLE" th:selected="${room.type == 'SIMPLE'}">Simple</option>
                            <option value="DOBLE" th:selected="${room.type == 'DOBLE'}">Doble</option>
                            <option value="SUITE" th:selected="${room.type == 'SUITE'}">Suite</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Capacidad (personas) <span class="text-danger">*</span></label>
                        <input type="number" name="capacity" class="form-control"
                               th:value="${room.capacity}" min="1" max="20" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Precio por Noche ($) <span class="text-danger">*</span></label>
                        <input type="number" name="pricePerNight" class="form-control"
                               th:value="${room.pricePerNight}" min="0.01" step="0.01" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Estado <span class="text-danger">*</span></label>
                        <select name="status" class="form-select" required>
                            <option value="">-- Seleccionar --</option>
                            <option value="DISPONIBLE" th:selected="${room.status == 'DISPONIBLE'}">Disponible</option>
                            <option value="OCUPADA" th:selected="${room.status == 'OCUPADA'}">Ocupada</option>
                            <option value="MANTENIMIENTO" th:selected="${room.status == 'MANTENIMIENTO'}">Mantenimiento</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Descripción</label>
                        <textarea name="description" class="form-control" rows="3"
                                  placeholder="Descripción de la habitación..." th:text="${room.description}"></textarea>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>
                        <span th:text="${editing} ? 'Actualizar' : 'Guardar'"></span>
                    </button>
                    <a th:href="@{/rooms}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
