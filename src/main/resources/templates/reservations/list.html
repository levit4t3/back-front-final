<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservaciones - Hotel Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .badge-PENDIENTE { background-color: #ffc107; color: #000 !important; }
        .badge-CONFIRMADA { background-color: #198754; }
        .badge-CANCELADA { background-color: #dc3545; }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid py-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">
            <i class="fas fa-calendar-check text-primary me-2"></i>
            <span th:if="${isAdmin}">Todas las Reservaciones</span>
            <span th:unless="${isAdmin}">Mis Reservaciones</span>
        </h4>
        <a th:href="@{/reservations/new}" class="btn btn-primary">
            <i class="fas fa-plus me-2"></i>Nueva Reservación
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">#</th>
                            <th th:if="${isAdmin}">Usuario</th>
                            <th>Habitación</th>
                            <th>Huésped</th>
                            <th>Check-in</th>
                            <th>Check-out</th>
                            <th>Noches</th>
                            <th>Total</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(reservations)}">
                            <td th:colspan="${isAdmin} ? 10 : 9" class="text-center py-5 text-muted">
                                <i class="fas fa-inbox fa-3x mb-2 d-block opacity-25"></i>
                                No hay reservaciones registradas
                            </td>
                        </tr>
                        <tr th:each="res : ${reservations}">
                            <td class="ps-4 text-muted small" th:text="${res.id}"></td>
                            <td th:if="${isAdmin}" class="small" th:text="${res.user.username}"></td>
                            <td>
                                <span class="fw-semibold" th:text="${res.room.roomNumber}"></span>
                                <span class="text-muted small ms-1" th:text="'(' + ${res.room.type} + ')'"></span>
                            </td>
                            <td class="small" th:text="${res.guestName}"></td>
                            <td class="small" th:text="${res.checkInDate}"></td>
                            <td class="small" th:text="${res.checkOutDate}"></td>
                            <td class="text-center small"
                                th:text="${#temporals.format(res.checkOutDate, 'yyyy-MM-dd') != null}
                                    ? T(java.time.temporal.ChronoUnit).DAYS.between(res.checkInDate, res.checkOutDate)
                                    : '-'">
                            </td>
                            <td class="fw-semibold text-success small">
                                $<span th:text="${#numbers.formatDecimal(res.totalPrice, 1, 2)}"></span>
                            </td>
                            <td>
                                <span class="badge text-white"
                                      th:classappend="'badge-' + ${res.status}"
                                      th:text="${res.status}"></span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{/reservations/{id}(id=${res.id})}" class="btn btn-sm btn-outline-info me-1" title="Ver">
                                    <i class="fas fa-eye"></i>
                                </a>
                                <a th:if="${res.status != 'CANCELADA'}"
                                   th:href="@{/reservations/{id}/edit(id=${res.id})}"
                                   class="btn btn-sm btn-outline-primary me-1" title="Editar">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <form th:if="${isAdmin and res.status != 'CONFIRMADA' and res.status != 'CANCELADA'}"
                                      th:action="@{/reservations/{id}/confirm(id=${res.id})}" method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-success me-1" title="Confirmar">
                                        <i class="fas fa-check"></i>
                                    </button>
                                </form>
                                <form th:if="${res.status != 'CANCELADA'}"
                                      th:action="@{/reservations/{id}/cancel(id=${res.id})}" method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger" title="Cancelar"
                                            onclick="return confirm('¿Cancelar esta reservación?')">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
