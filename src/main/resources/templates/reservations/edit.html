<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Reservación - Hotel Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style> body { background-color: #f8f9fa; } </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4" style="max-width: 700px;">
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/reservations/{id}(id=${reservation.id})}" class="btn btn-outline-secondary btn-sm me-3">
            <i class="fas fa-arrow-left"></i> Volver
        </a>
        <h4 class="fw-bold mb-0">
            <i class="fas fa-calendar-minus text-primary me-2"></i>Editar Reservación #<span th:text="${reservation.id}"></span>
        </h4>
    </div>

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-body p-4">
            <form th:action="@{/reservations/{id}/edit(id=${reservation.id})}" method="post" id="editReservationForm" th:object="${reservation}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-semibold">Habitación</label>
                        <input type="text" class="form-control bg-light"
                               th:value="${reservation.room.roomNumber + ' - ' + reservation.room.type + ' (Cap: ' + reservation.room.capacity + ') - $' + reservation.room.pricePerNight + '/noche'}"
                               readonly>
                        <input type="hidden" id="roomPrice" th:value="${reservation.room.pricePerNight}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Nombre del Huésped Principal <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{guestName}" class="form-control"
                               placeholder="Nombre completo" required maxlength="100">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Número de Huéspedes <span class="text-danger">*</span></label>
                        <input type="number" th:field="*{guestCount}" id="guestCount" class="form-control"
                               min="1" th:max="${reservation.room.capacity}" required>
                        <div class="form-text text-muted">Capacidad máxima de la habitación: <span th:text="${reservation.room.capacity}"></span> personas.</div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Fecha de Entrada <span class="text-danger">*</span></label>
                        <input type="date" th:field="*{checkInDate}" id="checkIn" class="form-control"
                               required onchange="calcularTotal()">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Fecha de Salida <span class="text-danger">*</span></label>
                        <input type="date" th:field="*{checkOutDate}" id="checkOut" class="form-control"
                               required onchange="calcularTotal()">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Notas adicionales</label>
                        <textarea th:field="*{notes}" class="form-control" rows="2"
                                  placeholder="Peticiones especiales, observaciones..."></textarea>
                    </div>
                </div>

                <!-- Resumen de precio -->
                <div id="priceSummary" class="mt-4 p-3 bg-primary bg-opacity-10 rounded-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <span class="fw-semibold">Resumen:</span>
                            <span id="summaryText" class="ms-2 text-muted small"></span>
                        </div>
                        <div class="text-end">
                            <span class="text-muted small">Total estimado:</span>
                            <h5 class="fw-bold text-primary mb-0">$<span id="totalPrice">0.00</span></h5>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>Guardar Cambios
                    </button>
                    <a th:href="@{/reservations/{id}(id=${reservation.id})}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('checkIn').min = today;
    document.getElementById('checkOut').min = today;

    document.getElementById('checkIn').addEventListener('change', function() {
        document.getElementById('checkOut').min = this.value;
        calcularTotal();
    });

    function calcularTotal() {
        const priceInput = document.getElementById('roomPrice');
        const checkIn = document.getElementById('checkIn').value;
        const checkOut = document.getElementById('checkOut').value;
        const summary = document.getElementById('priceSummary');

        if (priceInput && checkIn && checkOut) {
            const price = parseFloat(priceInput.value);
            const d1 = new Date(checkIn);
            const d2 = new Date(checkOut);
            const nights = Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
            if (nights > 0) {
                const total = (price * nights).toFixed(2);
                document.getElementById('totalPrice').textContent = total;
                document.getElementById('summaryText').textContent = nights + ' noche(s) × $' + price.toFixed(2);
                summary.style.display = 'block';
            } else {
                summary.style.display = 'none';
            }
        } else {
            summary.style.display = 'none';
        }
    }

    // Calcular al cargar
    calcularTotal();
</script>
</body>
</html>
